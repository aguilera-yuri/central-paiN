<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="login-tela">
    <div class="forms">
      <h1>Bem-vindo<br>de volta</h1>

      <div class="campo">
        <span>Nome</span>
        <input type="text" id="ipt_nome" placeholder="Ex: Thaisssss">
      </div>

      <div class="campo">
        <span>Nome de usuário</span>
        <input type="text" id="ipt_apelido" placeholder="Ex: sunnyzinha">
      </div>

      <div class="campo">
        <span>CPF</span>
        <input type="text" id="ipt_cpf" placeholder="Ex: 12345678910">
      </div>

      <div class="campo">
        <span>Email</span>
        <input type="text" id="ipt_email" placeholder="tata@email.com">
      </div>

      <div class="campo">
        <span>Estado</span>
        <select name="select_estado" id="ipt_estado">
          <option value="null">Selecione...</option>
          <option value="ac">Acre</option>
          <option value="al">Alagoas</option>
          <option value="ap">Amapá</option>
          <option value="am">Amazonas</option>
          <option value="ba">Bahia</option>
          <option value="ce">Ceará</option>
          <option value="df">Distrito Federal</option>
          <option value="es">Espírito Santo</option>
          <option value="go">Goiás</option>
          <option value="ma">Maranhão</option>
          <option value="mt">Mato Grosso</option>
          <option value="ms">Mato Grosso do Sul</option>
          <option value="mg">Minas Gerais</option>
          <option value="pa">Pará</option>
          <option value="pb">Paraíba</option>
          <option value="pr">Paraná</option>
          <option value="pe">Pernambuco</option>
          <option value="pi">Piauí</option>
          <option value="rj">Rio de Janeiro</option>
          <option value="rn">Rio Grande do Norte</option>
          <option value="rs">Rio Grande do Sul</option>
          <option value="ro">Rondônia</option>
          <option value="rr">Roraima</option>
          <option value="sc">Santa Catarina</option>
          <option value="sp">São Paulo</option>
          <option value="se">Sergipe</option>
          <option value="to">Tocantins</option>
        </select>
      </div>

      <div class="campo">
        <span>Senha</span>
        <input type="password" id="ipt_senha" placeholder="••••••••">
      </div>

      <div class="campo">
        <span>Confirme a senha</span>
        <input type="password" id="ipt_senhaCon" placeholder="••••••••">
      </div>

      <button class="btn-entrar">ENTRAR</button>

      <p class="link-cad">
        Já possui cadastro? <a href="login.html">Clique Aqui!</a>
      </p>
    </div>

    <div class="pain-vermelho">
    </div>
  </div>

</body>

</html>
