        function criarCard(jogador) {
            let imgOuSvg = "";
            
            if (jogador.foto != "") {
                imgOuSvg = '<img src="' + jogador.foto + '">';
            } else {
                imgOuSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="#3a3a3a" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>';
            }

            let icone = '<img src="' + jogador.icone + '">';
            let bandeira = '<img src="' + jogador.bandeira + '">';

            let html = '<div class="player-card">';
            html += '<div class="player-photo">' + imgOuSvg + '</div>';
            html += '<div class="player-info">';
            html += '<div class="flag">' + bandeira + '</div>';
            html += '<span class="player-name">' + jogador.nome + '</span>';
            html += '<span class="role-icon">' + icone + '</span>';
            html += '</div></div>';
            return html;
        }

        function preencherGrid(elemento, vetor) {
            let html = "";
            for (let i = 0; i < vetor.length; i++) {
                html += criarCard(vetor[i]);
            }
            elemento.innerHTML = html;
        }

        preencherGrid(grid_lol_principal, jogadoresLolPrincipal);
        preencherGrid(grid_lol_academy, jogadoresLolAcademy);
        preencherGrid(grid_cs_principal, jogadoresCsPrincipal);
        preencherGrid(grid_cs_academy, jogadoresCsAcademy);
        preencherGrid(grid_kings, jogadoresKings);
        preencherGrid(grid_gta, jogadoresGta);

        function trocarModalidade(moda) {
            painel_lol.style.display = "none";
            painel_cs.style.display = "none";
            painel_kings.style.display = "none";
            painel_gta.style.display = "none";

            btn_lol.style.cssText = estiloInativo;
            btn_cs.style.cssText = estiloInativo;
            btn_kings.style.cssText = estiloInativo;
            btn_gta.style.cssText = estiloInativo;

            if (moda == 'lol') { painel_lol.style.display = "block"; btn_lol.style.cssText = estiloAtivo; }
            if (moda == 'cs') { painel_cs.style.display = "block"; btn_cs.style.cssText = estiloAtivo; }
            if (moda == 'kings') { painel_kings.style.display = "block"; btn_kings.style.cssText = estiloAtivo; }
            if (moda == 'gta') { painel_gta.style.display = "block"; btn_gta.style.cssText = estiloAtivo; }
        }

        function trocarCategoria(jogo, cat) {
            if (jogo == 'lol') {
                lol_principal.style.display = "none";
                lol_academy.style.display = "none";
                btn_lol_principal.style.cssText = estiloCatInativo;
                btn_lol_academy.style.cssText = estiloCatInativo;
                if (cat == 'principal') { lol_principal.style.display = "block"; btn_lol_principal.style.cssText = estiloCatAtivo; }
                if (cat == 'academy') { lol_academy.style.display = "block"; btn_lol_academy.style.cssText = estiloCatAtivo; }
            }
            if (jogo == 'cs') {
                cs_principal.style.display = "none";
                cs_academy.style.display = "none";
                btn_cs_principal.style.cssText = estiloCatInativo;
                btn_cs_academy.style.cssText = estiloCatInativo;
                if (cat == 'principal') { cs_principal.style.display = "block"; btn_cs_principal.style.cssText = estiloCatAtivo; }
                if (cat == 'academy') { cs_academy.style.display = "block"; btn_cs_academy.style.cssText = estiloCatAtivo; }
