<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AquaTech | Login</title>

    <script src="./js/sessao.js"></script>

    <link rel="stylesheet" href="./css/estilo.css">
</head>

<body>

    <div class="login-tela">
    <div class="forms">
      <h1>Bem-vindo<br>de volta</h1>

      <div class="campo">
        <span for="email">Email</span>
        <br><br>
        <input type="email" id="ipt_email" placeholder="seu@email.com">
      </div>

      <div class="campo">
        <span for="senha">Senha</span>
        <input type="password" id="ipt_senha" placeholder="••••••••">
      </div>

      <button class="btn-entrar" onclick="entrar()">ENTRAR</button>

      <p class="link-cad">
        Ainda não possui cadastro? <a href="cadastro.html">Clique Aqui!</a>
      </p>
    </div>

    <div class="pain-vermelho">
    </div>
  </div>

</body>

</html>

<script>


    function entrar() {
        // aguardar();

        var emailVar = ipt_email.value;
        var senhaVar = ipt_senha.value;

        if (emailVar == "" || senhaVar == "") {
            cardErro.style.display = "block"
            mensagem_erro.innerHTML = "(Mensagem de erro para todos os campos em branco)";
            // finalizarAguardar();
            return false;
        }
        else {
            setInterval(sumirMensagem, 5000)
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.APELIDO_USUARIO = json.apelido;
                    sessionStorage.ID_USUARIO = json.id;
                    sessionStorage.ESTADO_USUARIO = JSON.stringify(json.aquarios)

                    setTimeout(function () {
                        window.location = "./dashboard/cards.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    function sumirMensagem() {
        cardErro.style.display = "none"
    }

</script>
